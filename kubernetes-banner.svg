<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">

  <!-- Background -->
  <rect width="1280" height="320" fill="#0a0e1a"/>

  <!-- Grid lines subtle -->
  <g stroke="#1a2040" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="160" y1="0" x2="160" y2="320"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
    <line x1="1120" y1="0" x2="1120" y2="320"/>
  </g>

  <!-- Decorative circles left -->
  <circle cx="80" cy="160" r="120" fill="none" stroke="#1e3a8a" stroke-width="0.8" opacity="0.4"/>
  <circle cx="80" cy="160" r="80" fill="none" stroke="#1e40af" stroke-width="0.6" opacity="0.3"/>
  <circle cx="80" cy="160" r="40" fill="none" stroke="#2563eb" stroke-width="0.5" opacity="0.3"/>

  <!-- Decorative circles right -->
  <circle cx="1200" cy="160" r="120" fill="none" stroke="#1e3a8a" stroke-width="0.8" opacity="0.4"/>
  <circle cx="1200" cy="160" r="80" fill="none" stroke="#1e40af" stroke-width="0.6" opacity="0.3"/>
  <circle cx="1200" cy="160" r="40" fill="none" stroke="#2563eb" stroke-width="0.5" opacity="0.3"/>

  <!-- Kubernetes helm wheel icon (centered left of text) -->
  <!-- Outer ring -->
  <circle cx="520" cy="160" r="52" fill="none" stroke="#326CE5" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="520" cy="160" r="18" fill="#326CE5"/>
  <!-- Center dot -->
  <circle cx="520" cy="160" r="7" fill="#0a0e1a"/>
  <!-- 7 spokes -->
  <g stroke="#326CE5" stroke-width="4" stroke-linecap="round">
    <line x1="520" y1="142" x2="520" y2="108"/>
    <line x1="535" y1="146" x2="549" y2="115"/>
    <line x1="543" y1="160" x2="572" y2="160"/>
    <line x1="535" y1="174" x2="549" y2="205"/>
    <line x1="520" y1="178" x2="520" y2="212"/>
    <line x1="505" y1="174" x2="491" y2="205"/>
    <line x1="497" y1="160" x2="468" y2="160"/>
    <line x1="505" y1="146" x2="491" y2="115"/>
  </g>
  <!-- Handle bumps on outer ring -->
  <circle cx="520" cy="108" r="6" fill="#326CE5"/>
  <circle cx="549" cy="115" r="6" fill="#326CE5"/>
  <circle cx="572" cy="160" r="6" fill="#326CE5"/>
  <circle cx="549" cy="205" r="6" fill="#326CE5"/>
  <circle cx="520" cy="212" r="6" fill="#326CE5"/>
  <circle cx="491" cy="205" r="6" fill="#326CE5"/>
  <circle cx="468" cy="160" r="6" fill="#326CE5"/>
  <circle cx="491" cy="115" r="6" fill="#326CE5"/>

  <!-- Main title -->
  <text x="596" y="138" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">Kubernetes</text>
  <text x="596" y="185" font-size="20" font-weight="400" fill="#326CE5" letter-spacing="2">HANDS-ON PRACTICE GUIDE</text>

  <!-- Subtitle tags -->
  <rect x="596" y="205" width="88" height="24" rx="4" fill="#1e3a8a"/>
  <text x="640" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd">AWS EKS</text>

  <rect x="694" y="205" width="80" height="24" rx="4" fill="#14532d"/>
  <text x="734" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#86efac">Terraform</text>

  <rect x="784" y="205" width="56" height="24" rx="4" fill="#3b0764"/>
  <text x="812" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#d8b4fe">Helm</text>

  <rect x="850" y="205" width="70" height="24" rx="4" fill="#422006"/>
  <text x="885" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#fcd34d">Docker</text>

  <rect x="930" y="205" width="54" height="24" rx="4" fill="#1c1917"/>
  <text x="957" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#a8a29e">CI/CD</text>

  <!-- Bottom accent line -->
  <rect x="596" y="248" width="400" height="2" rx="1" fill="#326CE5" opacity="0.4"/>

  <!-- Bottom author line -->
  <text x="596" y="278" font-size="13" fill="#4b5563">github.com/OgulcanErdag</text>

  <!-- Dot pattern right side decoration -->
  <g fill="#1e3a8a" opacity="0.5">
    <circle cx="1050" cy="80" r="2"/><circle cx="1070" cy="80" r="2"/><circle cx="1090" cy="80" r="2"/><circle cx="1110" cy="80" r="2"/>
    <circle cx="1050" cy="100" r="2"/><circle cx="1070" cy="100" r="2"/><circle cx="1090" cy="100" r="2"/><circle cx="1110" cy="100" r="2"/>
    <circle cx="1050" cy="120" r="2"/><circle cx="1070" cy="120" r="2"/><circle cx="1090" cy="120" r="2"/><circle cx="1110" cy="120" r="2"/>
    <circle cx="1050" cy="140" r="2"/><circle cx="1070" cy="140" r="2"/><circle cx="1090" cy="140" r="2"/><circle cx="1110" cy="140" r="2"/>
  </g>

  <!-- Dot pattern left side decoration -->
  <g fill="#1e3a8a" opacity="0.5">
    <circle cx="170" cy="180" r="2"/><circle cx="190" cy="180" r="2"/><circle cx="210" cy="180" r="2"/><circle cx="230" cy="180" r="2"/>
    <circle cx="170" cy="200" r="2"/><circle cx="190" cy="200" r="2"/><circle cx="210" cy="200" r="2"/><circle cx="230" cy="200" r="2"/>
    <circle cx="170" cy="220" r="2"/><circle cx="190" cy="220" r="2"/><circle cx="210" cy="220" r="2"/><circle cx="230" cy="220" r="2"/>
    <circle cx="170" cy="240" r="2"/><circle cx="190" cy="240" r="2"/><circle cx="210" cy="240" r="2"/><circle cx="230" cy="240" r="2"/>
  </g>

</svg>
