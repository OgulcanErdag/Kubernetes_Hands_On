<svg width="860" height="620" viewBox="0 0 860 620" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace">

  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="620" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="15" font-weight="600" fill="#e6edf3">Kubernetes NetworkPolicy — Traffic Flow Overview</text>

  <!-- NetworkPolicy scope dashed border -->
  <rect x="490" y="55" width="320" height="370" rx="14" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="7 4" opacity="0.6"/>
  <text x="650" y="48" text-anchor="middle" font-size="11" fill="#378ADD" opacity="0.8">NetworkPolicy scope: mydb-ns</text>

  <!-- myshop-ns box -->
  <rect x="40" y="90" width="190" height="76" rx="10" fill="#0F6E56" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="135" y="122" text-anchor="middle" font-size="13" font-weight="600" fill="#9FE1CB">myshop-ns</text>
  <text x="135" y="143" text-anchor="middle" font-size="11" fill="#5DCAA5">app: myshop</text>

  <!-- nginx-ns box -->
  <rect x="40" y="250" width="190" height="76" rx="10" fill="#712B13" stroke="#D85A30" stroke-width="0.8"/>
  <text x="135" y="282" text-anchor="middle" font-size="13" font-weight="600" fill="#F5C4B3">nginx-ns</text>
  <text x="135" y="303" text-anchor="middle" font-size="11" fill="#F0997B">app: nginx</text>

  <!-- mydb-ns box -->
  <rect x="530" y="140" width="240" height="80" rx="10" fill="#0C447C" stroke="#378ADD" stroke-width="0.8"/>
  <text x="650" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#B5D4F4">mydb-ns</text>
  <text x="650" y="196" text-anchor="middle" font-size="11" fill="#85B7EB">db: mydb  |  port: 80</text>

  <!-- Ingress/Egress badge -->
  <rect x="535" y="92" width="88" height="22" rx="6" fill="#042C53" stroke="#378ADD" stroke-width="0.6"/>
  <text x="579" y="107" text-anchor="middle" font-size="10" fill="#85B7EB">Ingress ✓</text>
  <rect x="635" y="92" width="88" height="22" rx="6" fill="#173404" stroke="#639922" stroke-width="0.6"/>
  <text x="679" y="107" text-anchor="middle" font-size="10" fill="#97C459">Egress ✓</text>

  <!-- ALLOW arrow: myshop → mydb -->
  <line x1="232" y1="128" x2="528" y2="170" stroke="#1D9E75" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- ALLOW label -->
  <rect x="290" y="118" width="120" height="22" rx="5" fill="#0F3D2A" stroke="#1D9E75" stroke-width="0.6"/>
  <text x="350" y="133" text-anchor="middle" font-size="10" fill="#5DCAA5">✓ Allowed (Ingress)</text>

  <!-- BLOCK arrow: nginx → mydb (dashed) -->
  <line x1="232" y1="288" x2="528" y2="200" stroke="#D85A30" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#arrow-red)"/>
  <!-- BLOCK label -->
  <rect x="290" y="268" width="118" height="22" rx="5" fill="#3D1A0C" stroke="#D85A30" stroke-width="0.6"/>
  <text x="349" y="283" text-anchor="middle" font-size="10" fill="#F0997B">✗ Blocked (Ingress)</text>

  <!-- EGRESS arrow: mydb → myshop (curved) -->
  <path d="M 650 222 Q 650 340 400 340 Q 200 340 135 168" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-blue)"/>
  <!-- EGRESS label -->
  <rect x="310" y="332" width="140" height="22" rx="5" fill="#042C53" stroke="#378ADD" stroke-width="0.6"/>
  <text x="380" y="347" text-anchor="middle" font-size="10" fill="#85B7EB">✓ Allowed (Egress)</text>

  <!-- Divider line -->
  <line x1="30" y1="460" x2="830" y2="460" stroke="#30363d" stroke-width="0.8"/>
  <text x="430" y="453" text-anchor="middle" font-size="10" fill="#8b949e">NetworkPolicy YAML — key fields explained</text>

  <!-- YAML field boxes: row -->
  <!-- podSelector -->
  <rect x="30" y="472" width="175" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="117" y="493" text-anchor="middle" font-size="11" font-weight="600" fill="#c9d1d9">podSelector</text>
  <text x="117" y="511" text-anchor="middle" font-size="10" fill="#8b949e">db: mydb</text>
  <text x="117" y="528" text-anchor="middle" font-size="10" fill="#6e7681">Targets pods with this label</text>

  <!-- policyTypes -->
  <rect x="222" y="472" width="175" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.8"/>
  <text x="309" y="493" text-anchor="middle" font-size="11" font-weight="600" fill="#c9d1d9">policyTypes</text>
  <text x="309" y="511" text-anchor="middle" font-size="10" fill="#8b949e">Ingress + Egress</text>
  <text x="309" y="528" text-anchor="middle" font-size="10" fill="#6e7681">Controls both directions</text>

  <!-- ingress.from -->
  <rect x="414" y="472" width="195" height="68" rx="8" fill="#0F3D2A" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="511" y="493" text-anchor="middle" font-size="11" font-weight="600" fill="#9FE1CB">ingress.from</text>
  <text x="511" y="511" text-anchor="middle" font-size="10" fill="#5DCAA5">namespaceSelector: myshop-ns</text>
  <text x="511" y="528" text-anchor="middle" font-size="10" fill="#1D9E75">Only this namespace can reach mydb</text>

  <!-- egress.to -->
  <rect x="626" y="472" width="195" height="68" rx="8" fill="#042C53" stroke="#378ADD" stroke-width="0.8"/>
  <text x="723" y="493" text-anchor="middle" font-size="11" font-weight="600" fill="#B5D4F4">egress.to</text>
  <text x="723" y="511" text-anchor="middle" font-size="10" fill="#85B7EB">namespaceSelector: myshop-ns</text>
  <text x="723" y="528" text-anchor="middle" font-size="10" fill="#378ADD">mydb can only reach myshop-ns</text>

  <!-- Bottom note -->
  <rect x="30" y="558" width="800" height="46" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.6"/>
  <text x="430" y="576" text-anchor="middle" font-size="11" font-weight="600" fill="#e6edf3">Important: Port 80 in NetworkPolicy refers to the container port, NOT the Service port.</text>
  <text x="430" y="595" text-anchor="middle" font-size="10" fill="#8b949e">NetworkPolicy operates at the pod level — it bypasses the Service and enforces rules directly on the pod.</text>

</svg>
