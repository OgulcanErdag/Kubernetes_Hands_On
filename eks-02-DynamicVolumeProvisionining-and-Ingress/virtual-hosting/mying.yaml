apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: nginx.ogulcan-erdag.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mynginx
                port: 
                  number: 80
    - host: apache.ogulcan-erdag.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: myapache
                port: 
                  number: 80